<script>
const RESUME_URL = "";
const LINKEDIN = "https://www.linkedin.com/in/akash-yy/";
const GITHUB = "https://github.com/akash-yy";
const PROJECTS = [
  {name:"Exadata@GCP Migration",desc:"22 on-prem Oracle DBs → Exadata@GCP",stack:"Oracle Exadata X8M · GCP · RMAN · Data Guard",impact:"300TB+ migrated, ~0 downtime",url:""},
  {name:"OCI Hub-and-Spoke Network",desc:"Enterprise multicloud connectivity fabric",stack:"VCN · DRG · FastConnect · Terraform",impact:"Full IaC, multi-region connectivity",url:""},
  {name:"AWS Multi-Zone Infrastructure",desc:"Resilient multi-AZ architecture, full IaC",stack:"EC2 · VPC · RDS · IAM · GitHub Actions",impact:"Zero console clicks, automated pipelines",url:""}
];

const canvas = document.getElementById('iso');
const ctx = canvas.getContext('2d');
let W, H, animFrame, tick = 0, flowMode = 'idle', flowTick = 0, errorMode = false;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = rect.width;
  H = canvas.height = 260;
}
resize();
window.addEventListener('resize', resize);

// ISO helpers
function iso(gx, gy, gz) {
  const tx = (gx - gy) * 28;
  const ty = (gx + gy) * 14 - gz * 22;
  return { x: W/2 + tx - 80, y: H/2 + ty - 60 };
}

// Color palette
const C = {
  vpc:   '#185FA5', vpcL: '#378ADD', vpcD: '#0C447C',
  iam:   '#3b6d11', iamL: '#7ee787', iamD: '#27500A',
  cicd:  '#854F0B', cicdL: '#f0883e', cicdD: '#412402',
  tf:    '#534AB7', tfL:  '#d2a8ff', tfD:  '#26215C',
  db:    '#A32D2D', dbL:  '#ffa198', dbD:  '#501313',
  fc:    '#0F6E56', fcL:  '#5DCAA5', fcD:  '#04342C',
  drg:   '#854F0B', drgL: '#EF9F27', drgD: '#412402',
  nat:   '#534AB7', natL: '#AFA9EC', natD: '#26215C',
  fw:    '#A32D2D', fwL:  '#F09595', fwD:  '#501313',
  floor: '#0a0e14',
  grid:  '#0d1829',
};

// Iso block draw
function drawBlock(gx, gy, gz, w, d, h, col, colL, colD, label, sublabel, workerIdx) {
  const tl = iso(gx,     gy,     gz + h);
  const tr = iso(gx + w, gy,     gz + h);
  const br = iso(gx + w, gy + d, gz + h);
  const bl = iso(gx,     gy + d, gz + h);
  const ml = iso(gx,     gy,     gz);
  const mr = iso(gx + w, gy,     gz);
  const mbr= iso(gx + w, gy + d, gz);
  const mbl= iso(gx,     gy + d, gz);

  // Left face
  ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(ml.x,ml.y); ctx.lineTo(mbl.x,mbl.y); ctx.lineTo(bl.x,bl.y); ctx.closePath();
  ctx.fillStyle = colD; ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5; ctx.stroke();

  // Right face
  ctx.beginPath(); ctx.moveTo(tr.x,tr.y); ctx.lineTo(mr.x,mr.y); ctx.lineTo(mbr.x,mbr.y); ctx.lineTo(br.x,br.y); ctx.closePath();
  ctx.fillStyle = col; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5; ctx.stroke();

  // Top face
  ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath();
  ctx.fillStyle = colL; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5; ctx.stroke();

  // Label on top
  if(label) {
    const cx = (tl.x+tr.x+br.x+bl.x)/4;
    const cy = (tl.y+tr.y+br.y+bl.y)/4;
    ctx.save();
    ctx.font = 'bold 8px Courier New';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, cy);
    if(sublabel) {
      ctx.font = '6px Courier New';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillText(sublabel, cx, cy + 9);
    }
    ctx.restore();
  }
}

// Worker person draw (3D isometric stick figure)
function drawWorker(cx, cy, color, action, t, scale) {
  const sc = scale || 1;
  const bob = Math.sin(t * 3) * 2 * sc;
  const arm = Math.sin(t * 4) * 8 * sc;

  ctx.save();
  ctx.translate(cx, cy + bob);

  // Shadow
  ctx.beginPath(); ctx.ellipse(0, 8*sc, 7*sc, 3*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();

  // Body
  ctx.beginPath(); ctx.roundRect(-4*sc, -10*sc, 8*sc, 12*sc, 2*sc);
  ctx.fillStyle = color; ctx.fill();

  // Head
  ctx.beginPath(); ctx.arc(0, -14*sc, 5*sc, 0, Math.PI*2);
  ctx.fillStyle = '#f5cba7'; ctx.fill();
  ctx.strokeStyle = color; ctx.lineWidth = 1*sc; ctx.stroke();

  // Hard hat
  ctx.beginPath();
  ctx.ellipse(0, -17*sc, 6*sc, 2*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = '#febc2e'; ctx.fill();
  ctx.fillRect(-6*sc, -19*sc, 12*sc, 3*sc);

  // Eyes
  ctx.fillStyle = '#333';
  ctx.fillRect(-2.5*sc, -15.5*sc, 1.5*sc, 1.5*sc);
  ctx.fillRect(1*sc,   -15.5*sc, 1.5*sc, 1.5*sc);

  // Left arm
  ctx.save(); ctx.translate(-4*sc, -7*sc);
  ctx.rotate((-0.4 + Math.sin(t*3)*0.3)*sc);
  ctx.beginPath(); ctx.roundRect(-1.5*sc, 0, 3*sc, 9*sc, 1.5*sc);
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();

  // Right arm with tool
  ctx.save(); ctx.translate(4*sc, -7*sc);
  ctx.rotate((0.4 + arm/40)*sc);
  ctx.beginPath(); ctx.roundRect(-1.5*sc, 0, 3*sc, 9*sc, 1.5*sc);
  ctx.fillStyle = color; ctx.fill();
  // Tool (wrench)
  ctx.fillStyle = '#aaa';
  ctx.fillRect(-1*sc, 9*sc, 2*sc, 6*sc);
  ctx.restore();

  // Legs
  const lleg = Math.sin(t*3)*5*sc;
  ctx.save(); ctx.translate(-2.5*sc, 2*sc);
  ctx.rotate(lleg/30);
  ctx.beginPath(); ctx.roundRect(-2*sc, 0, 4*sc, 9*sc, 2*sc);
  ctx.fillStyle = '#1a2540'; ctx.fill();
  ctx.restore();

  ctx.save(); ctx.translate(2.5*sc, 2*sc);
  ctx.rotate(-lleg/30);
  ctx.beginPath(); ctx.roundRect(-2*sc, 0, 4*sc, 9*sc, 2*sc);
  ctx.fillStyle = '#1a2540'; ctx.fill();
  ctx.restore();

  // Action label
  if(action) {
    ctx.font = '6px Courier New';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.textAlign = 'center';
    ctx.fillText(action, 0, 20*sc);
  }

  ctx.restore();
}

// Packet / data flow orb
function drawPacket(x, y, color, size) {
  ctx.beginPath(); ctx.arc(x, y, size||4, 0, Math.PI*2);
  ctx.fillStyle = color; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, (size||4)+2, 0, Math.PI*2);
  ctx.strokeStyle = color; ctx.lineWidth = 0.8; ctx.globalAlpha=0.4; ctx.stroke(); ctx.globalAlpha=1;
}

// Flow connection line
function drawFlowLine(x1,y1,x2,y2,color,progress,dashed) {
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  if(dashed) ctx.setLineDash([4,4]);
  ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.moveTo(x1,y1);
  const mx = x1+(x2-x1)*progress;
  const my = y1+(y2-y1)*progress;
  ctx.lineTo(mx,my); ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
  ctx.restore();
  if(progress > 0.05) drawPacket(mx, my, color, 3);
}

// Define blocks positions
const blocks = [
  {gx:0,   gy:0,   gz:0, w:1.8, d:1.2, h:0.5, key:'internet', col:'#185FA5',  colL:'#378ADD', colD:'#0C447C', label:'Internet',  sub:'client'},
  {gx:2.2, gy:0,   gz:0, w:2,   d:1.2, h:0.6, key:'fc',       col:C.fc,       colL:C.fcL,     colD:C.fcD,     label:'FastConnect',sub:''},
  {gx:4.5, gy:0,   gz:0, w:1.8, d:1.2, h:0.5, key:'iam',      col:C.iam,      colL:C.iamL,    colD:C.iamD,    label:'IAM',       sub:'policy'},
  {gx:6.5, gy:0,   gz:0, w:1.8, d:1.2, h:0.5, key:'fw',       col:C.fw,       colL:C.fwL,     colD:C.fwD,     label:'Firewall',  sub:'NSG'},
  {gx:8.5, gy:0,   gz:0, w:1.8, d:1.2, h:0.5, key:'drg',      col:C.drg,      colL:C.drgL,    colD:C.drgD,    label:'DRG',       sub:'routing'},
  {gx:0,   gy:2.5, gz:0, w:1.8, d:1.4, h:0.5, key:'vpc',      col:C.vpc,      colL:C.vpcL,    colD:C.vpcD,    label:'VPC',       sub:'10.0.0.0/16'},
  {gx:2.2, gy:2.5, gz:0, w:2,   d:1.4, h:0.7, key:'app',      col:'#0F6E56',  colL:'#3DCAA5', colD:'#04342C', label:'Application',sub:'server'},
  {gx:4.5, gy:2.5, gz:0, w:1.8, d:1.4, h:0.5, key:'nat',      col:C.nat,      colL:C.natL,    colD:C.natD,    label:'NAT GW',    sub:'egress'},
  {gx:6.5, gy:2.5, gz:0, w:1.8, d:1.4, h:0.6, key:'tf',       col:C.tf,       colL:C.tfL,     colD:C.tfD,     label:'Terraform', sub:'IaC'},
  {gx:8.5, gy:2.5, gz:0, w:1.8, d:1.4, h:0.5, key:'db',       col:C.db,       colL:C.dbL,     colD:C.dbD,     label:'Exadata DB', sub:'Oracle'},
];

// Worker definitions
const workerDefs = [
  {blockKey:'vpc',  color:'#79c0ff', action:'building'},
  {blockKey:'iam',  color:'#7ee787', action:'fixing'},
  {blockKey:'app',  color:'#f0883e', action:'deploying'},
  {blockKey:'tf',   color:'#d2a8ff', action:'writing tf'},
  {blockKey:'db',   color:'#ffa198', action:'migrating'},
];

// Get block top-center screen position
function blockTopCenter(b) {
  const top = iso(b.gx + b.w/2, b.gy + b.d/2, b.gz + b.h);
  return top;
}

// Flow stages: internet -> FC -> IAM -> FW -> DRG -> app -> nat (return)
const flowStages = ['idle','sending','fc','iam','fw','drg','app','nat','done'];
let flowProgress = 0, flowStage = 0;
let flowActive = false;

// Connection paths between block centers (screen)
function getFlowPath() {
  const get = key => {
    const b = blocks.find(x=>x.key===key);
    return blockTopCenter(b);
  };
  return [
    {from:'internet',to:'fc',   color:'#58a6ff', label:'request'},
    {from:'fc',      to:'iam',  color:'#7ee787', label:'route validated'},
    {from:'iam',     to:'fw',   color:'#7ee787', label:'IAM ok'},
    {from:'fw',      to:'drg',  color:'#f0883e', label:'fw passed'},
    {from:'drg',     to:'app',  color:'#EF9F27', label:'routed'},
    {from:'app',     to:'nat',  color:'#5DCAA5', label:'response'},
    {from:'nat',     to:'internet', color:'#d2a8ff', label:'egress'},
  ];
}

function lerp(a,b,t){return a+(b-a)*t;}

let errorShake = 0, errorWorker = -1;

function drawErrorWorker(cx, cy, t) {
  ctx.save();
  ctx.translate(cx + Math.sin(t*20)*4, cy);
  const sc = 1;

  ctx.beginPath(); ctx.ellipse(0, 8*sc, 7*sc, 3*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(-4*sc, -10*sc, 8*sc, 12*sc, 2*sc);
  ctx.fillStyle = '#f85149'; ctx.fill();
  ctx.beginPath(); ctx.arc(0, -14*sc, 5*sc, 0, Math.PI*2);
  ctx.fillStyle = '#f5cba7'; ctx.fill();
  ctx.strokeStyle = '#f85149'; ctx.lineWidth = 1*sc; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0, -17*sc, 6*sc, 2*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = '#f85149'; ctx.fill();
  ctx.fillRect(-6*sc, -19*sc, 12*sc, 3*sc);
  // Sweat drop
  ctx.beginPath(); ctx.arc(7*sc, -16*sc, 2*sc, 0, Math.PI*2);
  ctx.fillStyle = '#58a6ff'; ctx.fill();
  // Hands up (apologize pose)
  ctx.save(); ctx.translate(-4*sc,-7*sc); ctx.rotate(-1.2);
  ctx.beginPath(); ctx.roundRect(-1.5*sc, 0, 3*sc, 9*sc, 1.5*sc);
  ctx.fillStyle = '#f85149'; ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(4*sc,-7*sc); ctx.rotate(1.2);
  ctx.beginPath(); ctx.roundRect(-1.5*sc, 0, 3*sc, 9*sc, 1.5*sc);
  ctx.fillStyle = '#f85149'; ctx.fill(); ctx.restore();
  // Legs
  ctx.save(); ctx.translate(-2.5*sc, 2*sc);
  ctx.beginPath(); ctx.roundRect(-2*sc, 0, 4*sc, 9*sc, 2*sc);
  ctx.fillStyle = '#1a2540'; ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(2.5*sc, 2*sc);
  ctx.beginPath(); ctx.roundRect(-2*sc, 0, 4*sc, 9*sc, 2*sc);
  ctx.fillStyle = '#1a2540'; ctx.fill(); ctx.restore();

  ctx.font = '6px Courier New'; ctx.fillStyle = '#f85149';
  ctx.textAlign = 'center'; ctx.fillText('sorry!! paging Akash', 0, 22*sc);
  ctx.restore();
}

// Main draw loop
function draw() {
  ctx.clearRect(0,0,W,H);

  // Background grid
  ctx.fillStyle = '#060a0f';
  ctx.fillRect(0,0,W,H);

  // Draw floor tiles
  for(let gx=-1;gx<12;gx++) {
    for(let gy=-1;gy<6;gy++) {
      const a = iso(gx,gy,0), b=iso(gx+1,gy,0), c=iso(gx+1,gy+1,0), d=iso(gx,gy+1,0);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y); ctx.closePath();
      ctx.fillStyle = (gx+gy)%2===0?'#070c12':'#060a0f';
      ctx.fill(); ctx.strokeStyle='#0d1520'; ctx.lineWidth=0.3; ctx.stroke();
    }
  }

  // Draw blocks
  blocks.forEach(b => {
    drawBlock(b.gx, b.gy, b.gz, b.w, b.d, b.h, b.col, b.colL, b.colD, b.label, b.sub);
  });

  // Draw idle flow connections (faint dashed lines always)
  const path = getFlowPath();
  path.forEach(seg => {
    const fb = blocks.find(x=>x.key===seg.from);
    const tb = blocks.find(x=>x.key===seg.to);
    if(!fb||!tb) return;
    const fp = blockTopCenter(fb), tp = blockTopCenter(tb);
    ctx.save(); ctx.strokeStyle='#1e2a3a'; ctx.lineWidth=1; ctx.setLineDash([3,5]);
    ctx.globalAlpha=0.4;
    ctx.beginPath(); ctx.moveTo(fp.x,fp.y); ctx.lineTo(tp.x,tp.y); ctx.stroke();
    ctx.restore(); ctx.setLineDash([]);
  });

  // Active flow animation
  if(flowActive && !errorMode) {
    flowTick += 0.02;
    const totalStages = path.length;
    const globalT = flowTick % (totalStages + 1);
    path.forEach((seg, i) => {
      const fb = blocks.find(x=>x.key===seg.from);
      const tb = blocks.find(x=>x.key===seg.to);
      if(!fb||!tb) return;
      const fp = blockTopCenter(fb), tp = blockTopCenter(tb);
      const stageStart = i, stageEnd = i+1;
      let prog = Math.max(0, Math.min(1, (globalT - stageStart)));
      if(prog > 0) drawFlowLine(fp.x,fp.y,tp.x,tp.y,seg.color,prog,false);
    });

    // Pulse glow on active block
    const activeStageIdx = Math.floor(flowTick % (path.length+1));
    if(activeStageIdx < path.length) {
      const activeSeg = path[activeStageIdx];
      const ab = blocks.find(x=>x.key===activeSeg.to);
      if(ab) {
        const ap = blockTopCenter(ab);
        ctx.save(); ctx.beginPath(); ctx.arc(ap.x,ap.y,12+Math.sin(tick)*3,0,Math.PI*2);
        ctx.strokeStyle=activeSeg.color; ctx.lineWidth=1.5; ctx.globalAlpha=0.4+Math.sin(tick*2)*0.2;
        ctx.stroke(); ctx.restore();
      }
    }
  }

  // Draw workers on their blocks
  if(!errorMode) {
    workerDefs.forEach((w, i) => {
      const b = blocks.find(x=>x.key===w.blockKey);
      if(!b) return;
      const top = blockTopCenter(b);
      drawWorker(top.x + (i%2===0?-8:8), top.y - 5, w.color, w.action, tick + i*1.3, 0.9);
    });
  } else {
    // Error: all workers have hands up
    workerDefs.forEach((w, i) => {
      const b = blocks.find(x=>x.key===w.blockKey);
      if(!b) return;
      const top = blockTopCenter(b);
      drawErrorWorker(top.x + (i%2===0?-8:8), top.y - 5, tick);
    });
    // Error sign floating
    ctx.save();
    const ex = W/2, ey = H/2 - 30 + Math.sin(tick*2)*4;
    ctx.font = 'bold 11px Courier New'; ctx.fillStyle = '#f85149';
    ctx.textAlign='center'; ctx.fillText('!! ERROR — contacting Akash !!', ex, ey);
    ctx.restore();
  }

  // Resume flow packet label
  if(flowActive && !errorMode) {
    const activeStageIdx = Math.floor(flowTick % (path.length+1));
    if(activeStageIdx < path.length) {
      ctx.save(); ctx.font='7px Courier New'; ctx.fillStyle='#FF6B35';
      ctx.textAlign='center';
      const p = path[activeStageIdx];
      const ab = blocks.find(x=>x.key===p.to);
      if(ab) {
        const ap = blockTopCenter(ab);
        ctx.fillText(p.label, ap.x, ap.y - 22);
      }
      ctx.restore();
    }
  }

  tick += 0.06;
  animFrame = requestAnimationFrame(draw);
}

function setFlow(mode) {
  if(mode==='active') { flowActive=true; errorMode=false; flowTick=0; }
  else if(mode==='error') { flowActive=false; errorMode=true; }
  else { flowActive=false; errorMode=false; }
}

function appendLines(lines, delay) {
  delay = delay||35;
  const term = document.getElementById('term');
  const cursorLine = term.querySelector('.cursor') ? term.querySelector('.cursor').closest('.tl') : null;
  lines.forEach((l,i) => {
    setTimeout(()=>{
      const d=document.createElement('div'); d.className='tl';
      d.innerHTML = l===''?'&nbsp;':l;
      if(cursorLine) term.insertBefore(d,cursorLine); else term.appendChild(d);
      term.scrollTop=term.scrollHeight;
    }, i*delay);
  });
  setTimeout(()=>{ term.scrollTop=term.scrollHeight; }, lines.length*delay+80);
  return lines.length*delay+100;
}

function runCmd(raw) {
  const input = raw.trim().toLowerCase();
  if(!input) return;
  hist.unshift(raw); histIdx=-1;
  const term=document.getElementById('term');
  const cursorLine=term.querySelector('.cursor')?term.querySelector('.cursor').closest('.tl'):null;
  if(cursorLine) cursorLine.innerHTML='<span class="tc-prompt">akash@cloud ➜ </span><span class="tc-cmd">'+raw+'</span>';

  document.querySelectorAll('.qb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.qb').forEach(b=>{ if(b.textContent===raw.trim()) b.classList.add('active'); });
  setTimeout(()=>document.querySelectorAll('.qb').forEach(b=>b.classList.remove('active')), 1200);

  let wait=0;
  if(input==='clear'){
    setTimeout(()=>{
      term.innerHTML='<div class="tl"><span class="tc-green">✔</span> <span class="tc-out">terminal cleared.</span></div><div class="tl"><span class="tc-prompt">akash@cloud ➜ </span><span class="cursor"></span></div>';
      setFlow('idle');
    },80);
    document.getElementById('cmd-inp').value='';
    return;
  }
  const fn=cmds[input];
  if(fn){ wait=fn(); }
  else {
    setFlow('error');
    wait=appendLines([
      `<span class="tc-red">command not found: ${raw}</span>`,
      '<span class="tc-pink">worker[0]: "uhh... i don\'t know that one... sorry!!"</span>',
      '<span class="tc-pink">worker[1]: "we\'re contacting Akash for help right now!!"</span>',
      '<span class="tc-out">try: <span class="tc-cyan">help</span></span>',
    ], 40);
    setTimeout(()=>setFlow('idle'), 4000);
  }

  const np=document.createElement('div'); np.className='tl';
  np.innerHTML='<span class="tc-prompt">akash@cloud ➜ </span><span class="cursor"></span>';
  setTimeout(()=>{ term.appendChild(np); term.scrollTop=term.scrollHeight; }, wait||400);
  document.getElementById('cmd-inp').value='';
}

function handleKey(e){
  if(e.key==='Enter'){ runCmd(document.getElementById('cmd-inp').value); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); if(histIdx<hist.length-1){histIdx++;document.getElementById('cmd-inp').value=hist[histIdx];} }
  else if(e.key==='ArrowDown'){ e.preventDefault(); if(histIdx>0){histIdx--;document.getElementById('cmd-inp').value=hist[histIdx];}else{histIdx=-1;document.getElementById('cmd-inp').value='';} }
}
